spring:
  application:
    name: incident-tracker

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:incident_tracker}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # 'update' auto-creates/updates tables based on entities - fine for dev,
      # production would use a migration tool (Flyway/Liquibase) instead
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8080}

# JWT configuration - secret comes from env var in real deployments,
# NEVER hardcoded. This default is only for local dev.
jwt:
  secret: ${JWT_SECRET:dev-only-secret-key-change-in-production-minimum-256-bits-long}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}  # 1 hour

# Actuator: expose health and prometheus endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

# Logging
logging:
  level:
    root: INFO
    com.comcast.incidenttracker: ${LOG_LEVEL:INFO}
