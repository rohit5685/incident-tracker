version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: incident_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
  backend:
    image: incident-tracker-backend:1.0.0
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: incident_tracker
    depends_on:
      postgres:
        condition: service_healthy
  frontend:
    image: incident-tracker-frontend:1.0.0
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
